<!--
index.html
MOODAY 主页面结构
Canvas
按钮
输入框
-->
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="canvas-wrap">

        <canvas id="canvas"></canvas>

    </div>

    <div class="controls">
<button id="photoBtn">
 照片
</button>

<button id="mirrorBtn">
    魔镜
</button>

<button id="templateBtn">
    模板
</button>
<button id="moodBtn">
    氛围
</button>
<button id="titleBtn">
    主标题
</button>

<button id="lightModeBtn">
    灯光
</button>

<button id="uploadBtn">
    上传
</button>

<button id="subTitleBtn">
    副标题
</button>
<button id="decoBtn">
装饰
</button>
<button id="previewBtn">
    预览
</button>        
<button id="printBtn">
    打印
</button>

        <input 
type="file" 
id="upload" 
style="display:none;">
<input
id="textInput"
type="text"
style="display:none;">
                  
    </div>

    

</div>
<div id="templateDrawer">

    <div
id="templateItem0"
class="drawer-item"
onclick="applyTemplate(0)"
>

家的模样

</div>

<div
id="templateItem1"
class="drawer-item"
onclick="applyTemplate(1)"
>

温暖时光

</div>

<div
id="templateItem2"
class="drawer-item"
onclick="applyTemplate(2)"
>

陪伴

</div>

</div>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="script.js"></script>
<script src="light.js"></script>
<script src="image.js"></script>
<script src="text.js"></script>
<script src="touch.js"></script>

</body>

</html>
