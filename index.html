<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <!-- =========================
    Canvas区域
    ========================== -->

    <div class="canvas-wrap">

        <canvas id="canvas"></canvas>

    </div>

    <!-- =========================
    控制区
    ========================== -->

    <div class="controls">

        <button id="lightModeBtn">
            灯光模式
        </button>

        <input type="file" id="upload">

        <input
        type="text"
        id="textInput"
        placeholder="输入文字">

        <button id="addText">
            新增文字
        </button>

        <button id="deleteText">
            删除文字
        </button>

    </div>

    <!-- =========================
    图层面板
    ========================== -->

    <div id="layerPanel"></div>

    <!-- =========================
    底部Dock
    ========================== -->

    <div class="bottom-dock">

        <button class="dock-btn">
            颜色
        </button>

        <button class="dock-btn">
            发光
        </button>

        <button class="dock-btn">
            图层
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
