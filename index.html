<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css" />

</head>

<body>

<div class="app">

<h1 class="title">
MOODAY EDITOR
</h1>

<div class="editor-area">

<div id="photoArea" class="photo-area">

<div id="photoLayer" class="photo-layer">

<img id="photoImg" />

</div>

<div id="textLayer" class="text-layer">
MOODAY
</div>

</div>

</div>

<div class="controls">

<label class="upload-btn">

上传照片

<input
type="file"
id="uploadInput"
accept="image/*"
hidden
/>

</label>

<input
type="text"
id="textInput"
placeholder="输入文字"
/>

<div class="slider-group">

<label>
图片缩放
</label>

<input
type="range"
id="scaleSlider"
min="0.5"
max="3"
step="0.01"
value="1"
/>

</div>

<div class="slider-group">

<label>
图片旋转
</label>

<input
type="range"
id="rotateSlider"
min="-180"
max="180"
step="1"
value="0"
/>

</div>

<div class="slider-group">

<label>
文字大小
</label>

<input
type="range"
id="textSizeSlider"
min="20"
max="120"
step="1"
value="60"
/>

</div>

<button id="submitBtn">

提交制作

</button>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
