<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOODAY Editor</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0f1115;
  color:white;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

h1{
  margin-bottom:16px;
  font-size:28px;
}

.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin-bottom:20px;
}

button,input{
  padding:10px 14px;
  border:none;
  border-radius:12px;
  background:#1e222b;
  color:white;
}

button{
  cursor:pointer;
}

.editor-shell{
  position:relative;
}

.wood-frame{
  padding:18px;
  border-radius:24px;
  background:linear-gradient(135deg,#7a5a3a,#4a3320);
  box-shadow:
    0 20px 40px rgba(0,0,0,0.5),
    inset 0 2px 6px rgba(255,255,255,0.1);
}

.canvas-wrap{
  position:relative;
  overflow:hidden;
  border-radius:16px;
  background:#111;
}

canvas{
  display:block;
  touch-action:none;
  background:#000;
}

.glow{
  position:absolute;
  inset:0;
  pointer-events:none;
  border-radius:16px;
  box-shadow:
    inset 0 0 30px rgba(255,255,255,0.05),
    0 0 20px rgba(0,255,255,0.2),
    0 0 50px rgba(0,255,255,0.15);
}

.mode-label{
  margin-top:14px;
  opacity:0.7;
  font-size:14px;
}

.slider-wrap{
  display:flex;
  align-items:center;
  gap:8px;
}

input[type="range"]{
  width:120px;
}
</style>
</head>
<body>

<h1>MOODAY Editor</h1>

<div class="toolbar">
  <input type="file" id="upload" accept="image/*" />

  <button onclick="setPortrait()">竖版</button>
  <button onclick="setLandscape()">横版</button>

  <button onclick="toggleWoodFrame()">木框模式</button>
  <button onclick="togglePhotocard()">透卡模式</button>

  <div class="slider-wrap">
    <span>灯光</span>
    <input type="range" min="0" max="100" value="60" id="glowSlider">
  </div>
</div>

<div class="editor-shell">
  <div class="wood-frame" id="woodFrame">
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="canvas"></canvas>
      <div class="glow"></div>
    </div>
  </div>
</div>

<div class="mode-label" id="modeLabel">
双指缩放 / 双指旋转 / 鼠标拖拽 / 滚轮缩放
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const glowSlider = document.getElementById('glowSlider');
const woodFrame = document.getElementById('woodFrame');
const canvasWrap = document.getElementById('canvasWrap');

let editorWidth = 800;
let editorHeight = 1000;

canvas.width = editorWidth;
canvas.height = editorHeight;

let imageObj = null;

let state = {
  x:0,
  y:0,
  scale:1,
  rotation:0
};

let isDragging = false;
let lastX = 0;
let lastY = 0;

let touchStartDistance = 0;
let touchStartAngle = 0;
let startScale = 1;
let startRotation = 0;

function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(!imageObj) return;

  ctx.save();

  ctx.translate(state.x, state.y);
  ctx.rotate(state.rotation * Math.PI / 180);
  ctx.scale(state.scale, state.scale);

  ctx.drawImage(
    imageObj,
    -imageObj.width/2,
    -imageObj.height/2
  );

  ctx.restore();

  acrylicGlow();
}

function acrylicGlow(){
  const glowValue = glowSlider.value;

  canvasWrap.style.boxShadow = `
    0 0 ${glowValue/2}px rgba(255,255,255,0.25),
    0 0 ${glowValue}px rgba(0,255,255,0.18),
    0 0 ${glowValue*1.5}px rgba(0,180,255,0.1)
  `;
}

function fitImage(){
  if(!imageObj) return;

  const scaleX = editorWidth / imageObj.width;
  const scaleY = editorHeight / imageObj.height;

  state.scale = Math.max(scaleX, scaleY);

  state.x = editorWidth / 2;
  state.y = editorHeight / 2;

  render();
}

function clampImage(){
  if(!imageObj) return;

  const w = imageObj.width * state.scale;
  const h = imageObj.height * state.scale;

  const minX = editorWidth - w/2;
  const maxX = w/2;

  const minY = editorHeight - h/2;
  const maxY = h/2;

  state.x = Math.min(Math.max(state.x, minX), maxX);
  state.y = Math.min(Math.max(state.y, minY), maxY);
}

function setPortrait(){
  editorWidth = 800;
  editorHeight = 1000;

  canvas.width = editorWidth;
  canvas.height = editorHeight;

  fitImage();
}

function setLandscape(){
  editorWidth = 1000;
  editorHeight = 800;

  canvas.width = editorWidth;
  canvas.height = editorHeight;

  fitImage();
}

function toggleWoodFrame(){
  woodFrame.style.display = woodFrame.style.display === 'none' ? 'block' : 'block';
}

function togglePhotocard(){
  canvasWrap.style.backdropFilter = 'blur(6px)';
  canvasWrap.style.background = 'rgba(255,255,255,0.05)';
}

document.getElementById('upload').addEventListener('change', e=>{
  const file = e.target.files[0];
  if(!file) return;

  const img = new Image();

  img.onload = ()=>{
    imageObj = img;
    fitImage();
  }

  img.src = URL.createObjectURL(file);
});

canvas.addEventListener('mousedown', e=>{
  isDragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});

window.addEventListener('mouseup', ()=>{
  isDragging = false;
});

window.addEventListener('mousemove', e=>{
  if(!isDragging || !imageObj) return;

  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;

  state.x += dx;
  state.y += dy;

  lastX = e.clientX;
  lastY = e.clientY;

  clampImage();
  render();
});

canvas.addEventListener('wheel', e=>{
  e.preventDefault();

  if(!imageObj) return;

  const zoom = 0.05;

  if(e.deltaY < 0){
    state.scale += zoom;
  }else{
    state.scale -= zoom;
  }

  state.scale = Math.max(0.1, state.scale);

  clampImage();
  render();
});

canvas.addEventListener('touchstart', e=>{
  if(e.touches.length === 1){
    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;
  }

  if(e.touches.length === 2){
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;

    touchStartDistance = Math.sqrt(dx*dx + dy*dy);
    touchStartAngle = Math.atan2(dy, dx);

    startScale = state.scale;
    startRotation = state.rotation;
  }
});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();

  if(!imageObj) return;

  if(e.touches.length === 1){
    const dx = e.touches[0].clientX - lastX;
    const dy = e.touches[0].clientY - lastY;

    state.x += dx;
    state.y += dy;

    lastX = e.touches[0].clientX;
    lastY = e.touches[0].clientY;

    clampImage();
    render();
  }

  if(e.touches.length === 2){
    const dx = e.touches[1].clientX - e.touches[0].clientX;
    const dy = e.touches[1].clientY - e.touches[0].clientY;

    const dist = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx);

    state.scale = startScale * (dist / touchStartDistance);
    state.rotation = startRotation + ((angle - touchStartAngle) * 180 / Math.PI);

    clampImage();
    render();
  }
},{passive:false});

glowSlider.addEventListener('input', ()=>{
  acrylicGlow();
});

render();
</script>

</body>
</html>
