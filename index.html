<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY REAL FRAME</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
background:#ece8e2;
font-family:sans-serif;
display:flex;
justify-content:center;
padding:20px;
}

.main-wrap{
width:100%;
max-width:430px;
}

/* 顶部 */

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:18px;
}

.title{
font-size:34px;
font-weight:900;
line-height:1.1;
}

.save-btn{
background:black;
color:white;
padding:16px 22px;
border-radius:22px;
font-weight:700;
font-size:18px;
}

/* 主体 */

.editor{
background:#f7f4ef;
border-radius:40px;
padding:22px;
box-shadow:
0 10px 30px rgba(0,0,0,.08),
inset 0 2px 0 rgba(255,255,255,.9);
}

/* 实体背景 */

.room-bg{
position:relative;
height:620px;
border-radius:35px;
overflow:hidden;
background:
linear-gradient(rgba(255,255,255,.45),rgba(255,255,255,.45)),
url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop');
background-size:cover;
background-position:center;
display:flex;
justify-content:center;
align-items:center;
}

/* 灯牌主体 */

.frame-wrap{
position:relative;
}

/* 亚克力外框 */

.real-frame{
width:300px;
height:190px;
border-radius:28px;
padding:12px;

background:
linear-gradient(145deg,
rgba(255,255,255,.95),
rgba(230,230,230,.88));

box-shadow:
0 25px 45px rgba(0,0,0,.25),
0 8px 16px rgba(0,0,0,.12),
inset 0 3px 2px rgba(255,255,255,.95),
inset 0 -2px 4px rgba(0,0,0,.08);

position:relative;
}

/* 发光 */

.real-frame::before{
content:'';
position:absolute;
inset:-8px;
border-radius:35px;
background:rgba(255,255,255,.45);
filter:blur(18px);
z-index:-1;
}

/* 内部照片 */

.photo-area{
width:100%;
height:100%;
border-radius:20px;
overflow:hidden;
position:relative;
background:black;
}

.photo-area img{
width:100%;
height:100%;
object-fit:cover;
}

/* 粉色灯带 */

.neon{
position:absolute;
inset:14px;
border-radius:18px;
border:3px dashed #ff7ecb;

box-shadow:
0 0 10px #ff7ecb,
0 0 20px rgba(255,126,203,.8);
}

/* 文字 */

.main-title{
position:absolute;
top:20px;
left:0;
width:100%;
text-align:center;
font-size:22px;
font-weight:900;
color:white;
text-shadow:
0 2px 5px rgba(0,0,0,.5),
0 0 10px rgba(255,255,255,.5);
}

.date{
position:absolute;
bottom:24px;
width:100%;
text-align:center;
font-size:20px;
font-weight:800;
color:white;
text-shadow:
0 2px 5px rgba(0,0,0,.5);
}

/* 底座 */

.base{
margin-top:18px;
width:240px;
height:70px;
background:
linear-gradient(145deg,#fff,#ece7df);

border-radius:20px;

display:flex;
align-items:center;
justify-content:center;

font-size:18px;
color:#b8a7a7;
font-weight:700;

box-shadow:
0 10px 20px rgba(0,0,0,.15),
inset 0 2px 0 rgba(255,255,255,.9);
}

/* 吊牌 */

.tag{
position:absolute;
right:-18px;
top:45px;

width:58px;
height:120px;

background:white;
border-radius:18px;

box-shadow:
0 10px 18px rgba(0,0,0,.18);

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

font-size:12px;
font-weight:700;
color:#666;
}

.tag::before{
content:'';
position:absolute;
top:12px;
width:10px;
height:10px;
background:#ddd;
border-radius:50%;
}

/* 右侧笔 */

.pen-box{
position:absolute;
right:-40px;
bottom:-10px;

width:52px;
height:120px;

background:white;
border-radius:18px;

box-shadow:
0 10px 18px rgba(0,0,0,.18);

display:flex;
justify-content:center;
align-items:center;
gap:8px;
}

.pen1{
width:10px;
height:70px;
background:#ff6d5f;
border-radius:10px;
transform:rotate(10deg);
}

.pen2{
width:10px;
height:70px;
background:#454b61;
border-radius:10px;
transform:rotate(-10deg);
}

/* 左边工具栏 */

.left-tools{
position:fixed;
left:16px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:14px;
}

.tool{
width:58px;
height:58px;
border-radius:18px;
background:#f4f1ec;
display:flex;
justify-content:center;
align-items:center;
font-size:28px;
box-shadow:0 4px 10px rgba(0,0,0,.08);
}

/* 手机 */

@media(max-width:768px){

.left-tools{
position:fixed;
left:8px;
top:auto;
bottom:12px;
transform:none;
flex-direction:row;
z-index:999;
}

.tool{
width:52px;
height:52px;
font-size:24px;
}

.real-frame{
width:250px;
height:160px;
}

.base{
width:210px;
font-size:16px;
}

.room-bg{
height:560px;
}

.title{
font-size:28px;
}

}

</style>
</head>

<body>

<!-- 左侧工具 -->

<div class="left-tools">

<div class="tool">🖼️</div>
<div class="tool">T</div>
<div class="tool">😊</div>
<div class="tool">⬡</div>
<div class="tool">🎨</div>

</div>

<div class="main-wrap">

<div class="top-bar">

<div class="title">
조명 액자 편집
</div>

<div class="save-btn">
저장
</div>

</div>

<div class="editor">

<div class="room-bg">

<div class="frame-wrap">

<!-- 灯牌 -->

<div class="real-frame">

<div class="photo-area">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="neon"></div>

<div class="main-title">
♡ 우리의 추억 ♡
</div>

<div class="date">
2024.05.20 사랑해 ♡
</div>

</div>

</div>

<!-- 吊牌 -->

<div class="tag">
🌸<br>
우리의 추억<br>
2024.05.20
</div>

<!-- 笔 -->

<div class="pen-box">
<div class="pen1"></div>
<div class="pen2"></div>
</div>

<!-- 底座 -->

<div class="base">
♡ 나의 소중한 순간 ♡
</div>

</div>

</div>

</div>

</div>

</body>
</html>
