<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="canvas-wrap">

        <canvas id="canvas"></canvas>

    </div>

    <div class="controls">

        <input type="file" id="upload">

        <button id="lightModeBtn">
            切换灯光
        </button>

        <input 
        type="text" 
        id="textInput" 
        placeholder="输入文字">

        <button id="addText">
            新增文字
        </button>

        <button id="deleteText">
            删除文字
        </button>

        <label>
            发光强度
        </label>

        <input 
        type="range" 
        id="glowSlider" 
        min="0" 
        max="50" 
        value="20">

        <label>
            文字颜色
        </label>

        <input 
        type="color" 
        id="colorPicker" 
        value="#ffffff">

    </div>

    <div id="layerPanel"></div>

</div>

<script src="script.js"></script>

</body>

</html>
