<!--
index.html
MOODAY 主页面结构
Canvas
按钮
输入框
-->
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="canvas-wrap">

        <canvas id="canvas"></canvas>

    </div>

    <div class="controls">
<button id="photoBtn">
 사진
</button>

<button id="mirrorBtn">
    매직미러
</button>

<button id="templateBtn">
    템플릿
</button>
<button id="moodBtn">
    분위기
</button>
<button id="titleBtn">
    제목
</button>

<button id="lightModeBtn">
    灯光
</button>

<button id="uploadBtn">
    업로드
</button>

<button id="subTitleBtn">
    부제목
</button>
<button id="decoBtn">
    장식
</button>
<button id="previewBtn">
    미리보기
</button>        
<button id="printBtn">
    저장
</button>

        <input 
type="file" 
id="upload" 
style="display:none;">
<input
id="textInput"
type="text"
style="display:none;">
                  
    </div>

    

</div>
<div id="templateDrawer">

    <div
id="templateItem0"
class="drawer-item"
onclick="applyTemplate(0)"
>

우리 집

</div>

<div
id="templateItem1"
class="drawer-item"
onclick="applyTemplate(1)"
>

따뜻한 시간

</div>

<div
id="templateItem2"
class="drawer-item"
onclick="applyTemplate(2)"
>

함께

</div>
<div
id="templateItem3"
class="drawer-item"
onclick="applyTemplate(3)"
>

행복한 순간

</div>

<div
id="templateItem4"
class="drawer-item"
onclick="applyTemplate(4)"
>

우리의 이야기

</div>
</div>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="script.js"></script>
<script src="light.js"></script>
<script src="image.js"></script>
<script src="text.js"></script>
<script src="touch.js"></script>

</body>

</html>
