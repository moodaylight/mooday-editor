<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MOODAY EDITOR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0d0d0d;
color:white;
overflow:hidden;
}

.app{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:700;
letter-spacing:2px;
background:#111;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.editor{
flex:1;
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at center,
rgba(255,255,255,0.06),
transparent 70%);
}

.canvas{
width:320px;
height:480px;
background:#1a1a1a;
border-radius:24px;
position:relative;
overflow:hidden;
box-shadow:
0 0 50px rgba(255,255,255,0.08);
}

.canvas img{
position:absolute;
top:50%;
left:50%;
transform:
translate(-50%,-50%)
scale(1);
max-width:none;
user-select:none;
touch-action:none;
}

.glow{
position:absolute;
inset:0;
pointer-events:none;
background:
radial-gradient(circle,
transparent 40%,
rgba(255,255,255,0.08));
}

.controls{
height:140px;
background:#111;
border-top:1px solid rgba(255,255,255,0.08);
display:flex;
flex-direction:column;
padding:14px;
gap:14px;
}

.upload-btn{
width:100%;
height:50px;
border:none;
border-radius:14px;
background:white;
color:black;
font-size:16px;
font-weight:700;
}

.slider-wrap{
display:flex;
flex-direction:column;
gap:10px;
}

.slider-wrap label{
font-size:13px;
opacity:0.7;
}

input[type="range"]{
width:100%;
}

.tip{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
MOODAY EDITOR
</div>

<div class="editor">

<div class="canvas" id="canvas">

<img id="photo"/>

<div class="glow"></div>

</div>

<div class="tip">
拖动照片调整位置
</div>

</div>

<div class="controls">

<input
type="file"
id="upload"
accept="image/*"
hidden
/>

<button
class="upload-btn"
onclick="document.getElementById('upload').click()"
>
上传照片
</button>

<div class="slider-wrap">

<label>
缩放
</label>

<input
type="range"
id="scaleSlider"
min="0.5"
max="3"
step="0.01"
value="1"
/>

</div>

</div>

</div>

<script>

const upload = document.getElementById('upload');
const photo = document.getElementById('photo');
const slider = document.getElementById('scaleSlider');

let scale = 1;

let posX = 0;
let posY = 0;

let startX = 0;
let startY = 0;

let dragging = false;

upload.addEventListener('change',(e)=>{

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

photo.src = event.target.result;

photo.style.width = '100%';

updateTransform();

}

reader.readAsDataURL(file);

}

});

slider.addEventListener('input',(e)=>{

scale = e.target.value;

updateTransform();

});

function updateTransform(){

photo.style.transform =
`
translate(
calc(-50% + ${posX}px),
calc(-50% + ${posY}px)
)
scale(${scale})
`;

}

photo.addEventListener('pointerdown',(e)=>{

dragging = true;

startX = e.clientX - posX;
startY = e.clientY - posY;

});

window.addEventListener('pointermove',(e)=>{

if(!dragging) return;

posX = e.clientX - startX;
posY = e.clientY - startY;

updateTransform();

});

window.addEventListener('pointerup',()=>{

dragging = false;

});

</script>

</body>
</html>
