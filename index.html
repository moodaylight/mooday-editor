<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>조명 액자 편집기 V5</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#f3efe9] min-h-screen flex justify-center items-center p-4">

  <div class="w-[390px] h-[844px] bg-white rounded-[40px] overflow-hidden shadow-2xl border border-neutral-200 relative">

    <!-- Header -->
    <div class="h-16 px-5 flex items-center justify-between border-b bg-white">
      <button class="text-xl">←</button>
      <div class="font-bold text-lg">조명 액자 편집</div>
      <button class="bg-black text-white text-sm px-4 py-2 rounded-xl">저장</button>
    </div>

    <!-- Product Switch -->
    <div class="px-4 pt-4">
      <div class="bg-neutral-100 rounded-2xl p-1 flex gap-1">
        <button class="flex-1 bg-white rounded-xl py-2 text-sm font-medium shadow-sm">단독 액자</button>
        <button class="flex-1 rounded-xl py-2 text-sm text-neutral-500">데스크 세트</button>
      </div>
    </div>

    <!-- Main Product -->
    <div class="px-4 pt-4">
      <div class="rounded-[32px] bg-gradient-to-b from-[#dcc9ba] to-[#8d6a59] h-[430px] relative overflow-hidden">

        <div class="absolute inset-0 flex items-center justify-center">

          <div class="relative w-[310px] h-[260px]">

            <!-- Base -->
            <div class="absolute bottom-0 left-0 w-full h-20 bg-[#f8f8f5] rounded-2xl shadow-2xl"></div>

            <!-- Base Text -->
            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 text-[#8b6b58] text-xl tracking-wide">
              ♡ 나의 소중한 순간 ♡
            </div>

            <!-- Pen Holder -->
            <div class="absolute right-0 bottom-14 w-20 h-32 bg-[#f8f8f5] rounded-2xl shadow-xl flex flex-col items-center justify-center text-center text-[10px] text-neutral-700">
              <div class="text-lg">🌼</div>
              우리의 추억<br>
              2024.05.20
            </div>

            <!-- Pens -->
            <div class="absolute right-2 bottom-38 text-4xl rotate-12">✏️</div>

            <!-- Frame -->
            <div class="absolute left-0 bottom-16 w-[230px] h-[170px] bg-[#f7f7f5] rounded-[28px] shadow-2xl p-3">

              <!-- Light Area -->
              <div class="w-full h-full rounded-[18px] overflow-hidden relative shadow-[0_0_35px_rgba(255,220,180,0.75)]">

                <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
                     class="w-full h-full object-cover">

                <!-- Decorations -->
                <div class="absolute inset-0 text-white">

                  <div class="absolute top-3 left-4 text-xs">✨</div>
                  <div class="absolute top-6 right-5 text-xs">✨</div>
                  <div class="absolute bottom-5 left-5 text-xs">✨</div>
                  <div class="absolute bottom-8 right-8 text-xs">✨</div>

                  <div class="absolute top-5 left-1/2 -translate-x-1/2 text-lg drop-shadow-lg tracking-wide">
                    우리의 소중한 순간
                  </div>

                  <div class="absolute bottom-4 left-1/2 -translate-x-1/2 text-sm drop-shadow-lg">
                    2024.05.20 ♡
                  </div>

                </div>

              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Lighting -->
    <div class="px-4 pt-4">
      <div class="bg-neutral-50 rounded-3xl p-4 border border-neutral-100">

        <div class="flex items-center justify-between mb-3">
          <div class="text-sm font-semibold">조명 모드</div>
          <div class="text-xs text-neutral-500">짧게 눌러 변경</div>
        </div>

        <div class="grid grid-cols-3 gap-2 mb-4">
          <button class="bg-[#fff3df] border border-amber-200 rounded-2xl py-3 text-sm font-medium">따뜻한 빛</button>
          <button class="bg-white border rounded-2xl py-3 text-sm">중간 빛</button>
          <button class="bg-white border rounded-2xl py-3 text-sm">차가운 빛</button>
        </div>

        <div class="flex items-center gap-3">
          <span>☀️</span>
          <input type="range" class="w-full" value="70">
          <span class="text-sm text-neutral-500">70%</span>
        </div>

      </div>
    </div>

    <!-- Bottom Tool -->
    <div class="absolute bottom-0 left-0 right-0 bg-white border-t h-24 px-2 flex justify-around items-start pt-3">

      <div class="flex flex-col items-center text-xs gap-1">
        <div class="w-12 h-12 rounded-2xl bg-neutral-100 flex items-center justify-center text-xl">🖼️</div>
        템플릿
      </div>

      <div class="flex flex-col items-center text-xs gap-1">
        <div class="w-12 h-12 rounded-2xl bg-neutral-100 flex items-center justify-center text-xl">📷</div>
        사진
      </div>

      <div class="flex flex-col items-center text-xs gap-1">
        <div class="w-12 h-12 rounded-2xl bg-neutral-100 flex items-center justify-center text-xl">✍️</div>
        문자
      </div>

      <div class="flex flex-col items-center text-xs gap-1">
        <div class="w-12 h-12 rounded-2xl bg-neutral-100 flex items-center justify-center text-xl">💡</div>
        조명
      </div>

      <div class="flex flex-col items-center text-xs gap-1">
        <div class="w-12 h-12 rounded-2xl bg-neutral-100 flex items-center justify-center text-xl">✨</div>
        장식
      </div>

    </div>

  </div>

</body>
</html>
