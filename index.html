<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>MOODAY PRO EDITOR</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#0a0a0a;
overflow:hidden;
color:white;
}

.app{
width:100vw;
height:100vh;
display:flex;
flex-direction:column;
}

.topbar{
height:70px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
letter-spacing:2px;
background:#111;
border-bottom:1px solid rgba(255,255,255,0.08);
}

.editor{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
overflow:hidden;
background:
radial-gradient(circle at center,
rgba(255,255,255,0.06),
transparent 70%);
}

.canvas-wrap{
position:relative;
}

.canvas{
width:320px;
height:480px;
background:#1b1b1b;
border-radius:26px;
overflow:hidden;
position:relative;
box-shadow:
0 0 50px rgba(255,255,255,0.08);
}

.canvas img{
position:absolute;
top:50%;
left:50%;
transform-origin:center;
touch-action:none;
user-select:none;
}

.overlay{
position:absolute;
inset:0;
pointer-events:none;
background:
radial-gradient(circle,
transparent 40%,
rgba(255,255,255,0.08));
}

.product-tag{
position:absolute;
top:14px;
left:14px;
padding:6px 12px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:999px;
font-size:12px;
}

.controls{
height:220px;
background:#111;
border-top:1px solid rgba(255,255,255,0.08);
padding:14px;
display:flex;
flex-direction:column;
gap:12px;
}

button{
height:52px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:700;
}

.upload-btn{
background:white;
color:black;
}

.export-btn{
background:#7c5cff;
color:white;
}

.slider-group{
display:flex;
flex-direction:column;
gap:8px;
}

label{
font-size:13px;
opacity:0.7;
}

input[type="range"]{
width:100%;
}

.tip{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
font-size:12px;
opacity:0.5;
}

</style>
</head>

<body>

<div class="app">

<div class="topbar">
MOODAY EDITOR
</div>

<div class="editor">

<div class="canvas-wrap">

<div class="canvas" id="canvas">

<div class="product-tag">
15×20 Mood Frame
</div>

<img id="photo"/>

<div class="overlay"></div>

</div>

</div>

<div class="tip">
双指缩放 · 拖动调整
</div>

</div>

<div class="controls">

<input
type="file"
id="upload"
accept="image/*"
hidden
/>

<button
class="upload-btn"
onclick="document.getElementById('upload').click()"
>
上传照片
</button>

<div class="slider-group">

<label>缩放</label>

<input
type="range"
id="scaleSlider"
min="0.5"
max="4"
step="0.01"
value="1"
/>

</div>

<button
class="export-btn"
onclick="exportImage()"
>
生成高清作品
</button>

</div>

</div>

<script>

const upload = document.getElementById('upload');
const photo = document.getElementById('photo');
const slider = document.getElementById('scaleSlider');

let scale = 1;
let posX = 0;
let posY = 0;

let dragging = false;

let startX = 0;
let startY = 0;

upload.addEventListener('change',(e)=>{

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

photo.src = event.target.result;

photo.onload = ()=>{

photo.style.width = '100%';

updateTransform();

};

};

reader.readAsDataURL(file);

}

});

slider.addEventListener('input',(e)=>{

scale = parseFloat(e.target.value);

updateTransform();

});

function updateTransform(){

photo.style.transform =
`
translate(
calc(-50% + ${posX}px),
calc(-50% + ${posY}px)
)
scale(${scale})
`;

}

photo.addEventListener('pointerdown',(e)=>{

dragging = true;

startX = e.clientX - posX;
startY = e.clientY - posY;

});

window.addEventListener('pointermove',(e)=>{

if(!dragging) return;

posX = e.clientX - startX;
posY = e.clientY - startY;

updateTransform();

});

window.addEventListener('pointerup',()=>{

dragging = false;

});

function exportImage(){

const exportCanvas = document.createElement('canvas');

exportCanvas.width = 1800;
exportCanvas.height = 2700;

const ctx = exportCanvas.getContext('2d');

ctx.fillStyle = '#1b1b1b';
ctx.fillRect(0,0,1800,2700);

const img = new Image();

img.crossOrigin = "anonymous";

img.onload = ()=>{

const drawWidth = img.width * scale;
const drawHeight = img.height * scale;

ctx.drawImage(
img,
900 - drawWidth/2 + posX*5,
1350 - drawHeight/2 + posY*5,
drawWidth,
drawHeight
);

const link = document.createElement('a');

link.download = 'MOODAY_PRINT.png';

link.href = exportCanvas.toDataURL('image/png');

link.click();

alert('高清作品已生成');

};

img.src = photo.src;

}

</script>

</body>
</html>
