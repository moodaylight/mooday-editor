<!--
index.html
MOODAY 主页面结构
Canvas
按钮
输入框
-->
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">
<link
href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&family=Gowun+Dodum&family=Gaegu:wght@400;700&family=Caveat:wght@400;700&display=swap"
rel="stylesheet">
</head>

<body>

<div class="app">
<!-- 首页轮播区 -->

<div id="homePage">

    <div id="homeBanner">

        <img
        id="bannerImg"
        src="banner1.jpg">

        <div id="bannerText">

            <h2 id="bannerTitle">
                MOODAY 매직미러
            </h2>

            <p id="bannerDesc">
                소중한 순간을 간직하세요
            </p>

        </div>

    </div>

    <div id="productHall">

        <div class="productCard"
        onclick="selectProduct('photo')">

            <span>📷</span>
            <p>일반 사진</p>

        </div>

        <div class="productCard"
        onclick="selectProduct('frame')">

            <span>🖼️</span>
            <p>액자 사진</p>

        </div>

        <div class="productCard"
        onclick="selectProduct('idcard')">

            <span>🪪</span>
            <p>증명사진</p>

        </div>

        <div class="productCard"
        onclick="selectProduct('mirror')">

            <span>💡</span>
            <p>매직미러</p>

        </div>

    </div>

</div>
<div id="editorContainer" style="display:none;">

    <div
    class="canvas-wrap"
    id="editorPage"
    style="display:none;">

        <canvas id="canvas"></canvas>

    </div>

</div>

<div id="bottomPanel" style="display:none;">


    <div id="statusPanel">

        <div id="statusContent">

            <button
            class="optionChip activeOption"
            data-type="default">

                상품 옵션 선택

            </button>

        </div>

    </div>

    <div class="controls">

<button id="uploadBtn">
업로드
</button>

<button id="templateBtn">
템플릿
</button>

<button id="decoBtn">
프레임
</button>

<button id="previewBtn">
미리보기
</button>

<button id="printBtn">
저장
</button>

<button id="submitBtn">
주문하기
</button>

</div>

    </div>

<div style="display:none;">

<button id="photoBtn">
사진
</button>

<button id="mirrorBtn">
매직미러
</button>

<button id="moodBtn">
분위기
</button>

<button id="lightModeBtn">
조명
</button>

</div>
<input
type="file"
id="upload"
style="display:none;">    
<input
id="textInput"
type="text"
style="display:none;">
 <div id="textEditorPanel">

<div id="editorMenuArea">

<div id="fontPanel"
style="display:flex">

<button
class="fontItem"
data-font="Nanum Gothic">
기본체
</button>

<button
class="fontItem"
data-font="Nanum Pen Script">
감성체
</button>

<button
class="fontItem"
data-font="Caveat">
로맨틱
</button>

<button
class="fontItem"
data-font="Gaegu">
베이비
</button>

<button
class="fontItem"
data-font="Nanum Myeongjo">
무비
</button>

<button
class="fontItem"
data-font="Gowun Dodum">
러블리
</button>

</div>

<div id="colorPanel"
style="display:none">

<div class="colorDot"
data-color="#ffffff"
style="background:#ffffff">
</div>

<div class="colorDot"
data-color="#ffd700"
style="background:#ffd700">
</div>

<div class="colorDot"
data-color="#f4c27a"
style="background:#f4c27a">
</div>

<div class="colorDot"
data-color="#ff69b4"
style="background:#ff69b4">
</div>

<div class="colorDot"
data-color="#87ceeb"
style="background:#87ceeb">
</div>

<div class="colorDot"
data-color="#98fb98"
style="background:#98fb98">
</div>

<div class="colorDot"
data-color="#c8a2ff"
style="background:#c8a2ff">
</div>

<div class="colorDot"
data-color="#f5deb3"
style="background:#f5deb3">
</div>

</div>

<div id="sizePanel"
style="display:none">

<button id="sizeMinus">
－
</button>

<span id="sizeValue">
28
</span>

<button id="sizePlus">
＋
</button>

</div>
<div id="strokePanel"
style="display:none">

<button id="strokeOff">
OFF
</button>

<button id="strokeOn">
ON
</button>

</div>
<div id="shadowPanel"
style="display:none">

<button id="shadowOff">
OFF
</button>

<button id="shadowOn">
ON
</button>

</div>
<div id="opacityPanel"
style="display:none">

<button id="opacityMinus">
－
</button>

<span id="opacityValue">
100
</span>

<button id="opacityPlus">
＋
</button>

</div>
</div>

    <input
        id="editorInput"
        type="text"
        placeholder="내용 입력">

<div id="editorTools">

<button id="fontBtn">
글꼴
</button>

<button id="sizeBtn">
크기
</button>

<button id="colorBtn">
색상
</button>

<button id="strokeBtn">
외곽선
</button>

<button id="shadowBtn">
그림자
</button>

<button id="opacityBtn">
투명도
</button>

</div>




</div>                 
    </div>

    

</div>
<div id="templateDrawer">

    <div
id="templateItem0"
class="drawer-item"
onclick="applyTemplate(0)"
>

우리 집

</div>

<div
id="templateItem1"
class="drawer-item"
onclick="applyTemplate(1)"
>

따뜻한 시간

</div>

<div
id="templateItem2"
class="drawer-item"
onclick="applyTemplate(2)"
>

함께

</div>
<div
id="templateItem3"
class="drawer-item"
onclick="applyTemplate(3)"
>

행복한 순간

</div>

<div
id="templateItem4"
class="drawer-item"
onclick="applyTemplate(4)"
>

우리의 이야기

</div>
</div>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="script.js"></script>
<script src="light.js"></script>
<script src="image.js"></script>
<script src="text.js"></script>
<script src="touch.js"></script>

</body>

</html>
