<!--
index.html
MOODAY 主页面结构
Canvas
按钮
输入框
-->
<!DOCTYPE html>
<html lang="zh">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>MOODAY EDITOR</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="app">

    <div class="canvas-wrap">

        <canvas id="canvas"></canvas>

    </div>

    <div class="controls">
<button id="photoBtn">
 사진
</button>

<button id="mirrorBtn">
    매직미러
</button>

<button id="templateBtn">
    템플릿
</button>
<button id="moodBtn">
    분위기
</button>
<button id="lightModeBtn">
    조명
</button>

<button id="uploadBtn">
    업로드
</button>

<button id="decoBtn">
    장식
</button>
<button id="previewBtn">
    미리보기
</button>        
<button id="printBtn">
    저장
</button>

        <input 
type="file" 
id="upload" 
style="display:none;">
<input
id="textInput"
type="text"
style="display:none;">
 <div id="textEditorPanel">

    <div id="editorTitle">
        텍스트 편집
    </div>

    <input
        id="editorInput"
        type="text"
        placeholder="내용 입력">

    <button id="fontBtn">
        글꼴
    </button>
<div id="fontPanel">

    <button
    class="fontItem"
    data-font="sans-serif">
    기본체
    </button>

    <button
    class="fontItem"
    data-font="serif">
    명조체
    </button>

    <button
    class="fontItem"
    data-font="cursive">
    손글씨
    </button>

    <button
class="fontItem"
data-font="fantasy">
특수체
</button>

</div>
<button id="colorBtn">
    색상
</button>

<div id="colorPanel">

    <button class="colorItem"
    data-color="#ffffff">
    흰색
    </button>

    <button class="colorItem"
    data-color="#ffd700">
    골드
    </button>

    <button class="colorItem"
    data-color="#ff69b4">
    핑크
    </button>

    <button class="colorItem"
    data-color="#87ceeb">
    하늘
    </button>

</div>
</div>                 
    </div>

    

</div>
<div id="templateDrawer">

    <div
id="templateItem0"
class="drawer-item"
onclick="applyTemplate(0)"
>

우리 집

</div>

<div
id="templateItem1"
class="drawer-item"
onclick="applyTemplate(1)"
>

따뜻한 시간

</div>

<div
id="templateItem2"
class="drawer-item"
onclick="applyTemplate(2)"
>

함께

</div>
<div
id="templateItem3"
class="drawer-item"
onclick="applyTemplate(3)"
>

행복한 순간

</div>

<div
id="templateItem4"
class="drawer-item"
onclick="applyTemplate(4)"
>

우리의 이야기

</div>
</div>
<script src="config.js"></script>
<script src="state.js"></script>
<script src="render.js"></script>
<script src="script.js"></script>
<script src="light.js"></script>
<script src="image.js"></script>
<script src="text.js"></script>
<script src="touch.js"></script>

</body>

</html>
