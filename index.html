<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY V5</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
background:#f3efe9;
font-family:sans-serif;
}

.frame-glow{
transition:0.3s;
}

.hidden-file{
display:none;
}

</head>

<body class="flex justify-center p-4">

<div class="w-[390px] bg-white min-h-screen rounded-[40px] overflow-hidden shadow-2xl relative">

</div>

<button class="bg-[#2f3545] text-white px-5 py-2 rounded-2xl">
저장
</button>
</div>

<!-- PRODUCT SWITCH -->
<div class="p-4">
<div class="bg-neutral-100 rounded-2xl p-1 flex gap-1">

<button id="singleBtn"
class="flex-1 bg-white py-3 rounded-2xl font-semibold">
단독 액자
</button>

<button id="deskBtn"
class="flex-1 py-3 rounded-2xl text-neutral-500">
데스크 세트
</button>

</div>
</div>

<!-- PRODUCT AREA -->
<div class="px-4">

<div class="h-[470px] rounded-[40px]
bg-gradient-to-b
from-[#eaded3]
to-[#b38c73]
relative overflow-hidden">

<!-- DESK SET -->
<div id="deskSet"
class="absolute inset-0 flex items-center justify-center">

<div class="relative w-[355px] h-[265px]">

<!-- LONG BASE -->
<div class="absolute bottom-0 left-0
w-full h-[68px]
bg-[#fbfbf8]
rounded-[20px]
shadow-[0_18px_45px_rgba(0,0,0,0.18)]">
</div>

<!-- BASE TEXT -->
<div class="absolute bottom-[18px]
left-1/2 -translate-x-1/2
text-[#9a7762]
text-[22px]
tracking-[2px]
whitespace-nowrap">
♡ 나의 소중한 순간 ♡
</div>

<!-- PEN HOLDER -->
<div class="absolute
right-[4px]
bottom-[66px]
w-[62px]
h-[125px]
bg-[#fbfbf8]
rounded-[18px]
shadow-xl
flex flex-col
items-center
justify-center
text-center
text-[10px]
text-neutral-700">

<div class="text-lg">🌼</div>

<div class="leading-tight mt-1">
우리의 추억
</div>

<div class="leading-tight">
2024.05.20
</div>

</div>

<!-- PENCIL -->
<div class="absolute
right-[5px]
bottom-[165px]
text-[42px]
rotate-[10deg]">
✏️
</div>

<!-- FRAME -->
<div class="absolute
left-0
bottom-[50px]
w-[270px]
h-[188px]">

<!-- SLOT -->
<div class="absolute bottom-[-8px] left-[38px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<div class="absolute bottom-[-8px] left-[120px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<div class="absolute bottom-[-8px] left-[200px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<!-- FRAME BODY -->
<div class="w-full h-full
bg-[#fbfbf8]
rounded-[30px]
p-[10px]
shadow-[0_15px_35px_rgba(0,0,0,0.2)]">

<!-- LIGHT AREA -->
<div id="lightArea"
class="frame-glow
relative
w-full
h-full
rounded-[22px]
overflow-hidden
shadow-[0_0_55px_rgba(255,220,180,0.9)]">

<img id="mainImage"
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
class="w-full h-full object-cover">

<!-- GLOW -->
<div class="absolute inset-0
bg-gradient-to-t
from-[rgba(255,220,180,0.18)]
to-transparent">
</div>

<!-- TEXT -->
<div class="absolute inset-0 text-white">

<div class="absolute top-3 left-4">✨</div>
<div class="absolute top-3 right-4">✨</div>
<div class="absolute bottom-5 left-4">✨</div>
<div class="absolute bottom-5 right-4">✨</div>

<div id="mainText"
class="absolute top-4
left-1/2 -translate-x-1/2
text-[26px]
drop-shadow-xl
whitespace-nowrap">
우리의 추억
</div>

<div id="dateText"
class="absolute bottom-4
left-1/2 -translate-x-1/2
text-[18px]
whitespace-nowrap
drop-shadow-lg">
2024.05.20 ♡
</div>

</div>
</div>
</div>
</div>
</div>

</div>

<!-- SINGLE FRAME -->
<div id="singleFrame"
class="hidden absolute inset-0
flex items-center justify-center">

<div class="relative w-[300px] h-[215px]">

<div class="absolute bottom-[10px] left-[45px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<div class="absolute bottom-[10px] left-[136px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<div class="absolute bottom-[10px] left-[225px]
w-[26px] h-[12px]
bg-[#e7e4de]
rounded-b-md">
</div>

<div class="w-full h-full
bg-[#fbfbf8]
rounded-[32px]
p-[12px]
shadow-[0_15px_35px_rgba(0,0,0,0.18)]">

<div id="singleLight"
class="frame-glow
w-full h-full
rounded-[24px]
overflow-hidden
shadow-[0_0_50px_rgba(255,220,180,0.85)]
relative">

<img id="singleImage"
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
class="w-full h-full object-cover">

</div>
</div>
</div>

</div>

</div>

<!-- LIGHT -->
<div class="p-4">

<div class="bg-neutral-50
rounded-[30px]
p-5 border">

<div class="flex justify-between mb-4">

<div class="font-bold">
조명 모드
</div>

<div class="text-neutral-400 text-sm">
짧게 눌러 변경
</div>

</div>

<div class="grid grid-cols-3 gap-2 mb-4">

<button onclick="setWarm()"
class="bg-[#fff1d6]
border border-amber-200
py-3 rounded-2xl">
따뜻한 빛
</button>

<button onclick="setWhite()"
class="bg-white border py-3 rounded-2xl">
화이트
</button>

<button onclick="setBlue()"
class="bg-white border py-3 rounded-2xl">
데이라이트
</button>

</div>

<div class="flex items-center gap-3">

<div class="text-2xl">☀️</div>

<input id="brightness"
type="range"
min="20"
max="100"
value="70"
class="w-full">

<div id="brightnessText">
70%
</div>

</div>

</div>
</div>

<!-- TEXT -->
<div class="px-4 pb-32">

<div class="bg-neutral-50
rounded-[30px]
p-5 border">

<div class="font-bold mb-4">
텍스트 편집
</div>

<input id="titleInput"
value="우리의 추억"
class="w-full border rounded-2xl px-4 py-3 mb-3">

<input id="dateInput"
value="2024.05.20 ♡"
class="w-full border rounded-2xl px-4 py-3 mb-3">

<button onclick="applyText()"
class="w-full bg-black text-white py-4 rounded-2xl">
텍스트 적용
</button>

</div>
</div>

<!-- BOTTOM -->
<div class="fixed bottom-0 left-0 right-0
flex justify-center">

<div class="w-[390px]
bg-white border-t
h-24
flex justify-around
items-start
pt-3
rounded-t-[30px]">

<label class="flex flex-col items-center text-xs gap-1 cursor-pointer">

<div class="w-12 h-12
bg-neutral-100
rounded-2xl
flex items-center justify-center text-xl">
📷
</div>

사진

<input id="fileInput"
type="file"
accept="image/*"
class="hidden-file">

</label>

<div class="flex flex-col items-center text-xs gap-1">

<div class="w-12 h-12
bg-neutral-100
rounded-2xl
flex items-center justify-center text-xl">
💡
</div>

조명

</div>

<div class="flex flex-col items-center text-xs gap-1">

<div class="w-12 h-12
bg-neutral-100
rounded-2xl
flex items-center justify-center text-xl">
✍️
</div>

문자

</div>

<div class="flex flex-col items-center text-xs gap-1">

<div class="w-12 h-12
bg-neutral-100
rounded-2xl
flex items-center justify-center text-xl">
✨
</div>

장식

</div>

</div>
</div>

<script>

const fileInput = document.getElementById('fileInput');
const mainImage = document.getElementById('mainImage');
const singleImage = document.getElementById('singleImage');

fileInput.addEventListener('change', function(e){

const file = e.target.files[0];

if(file){

const reader = new FileReader();

reader.onload = function(event){

mainImage.src = event.target.result;
singleImage.src = event.target.result;

}

reader.readAsDataURL(file);

}

});

function applyText(){

document.getElementById('mainText').innerText =
document.getElementById('titleInput').value;

document.getElementById('dateText').innerText =
document.getElementById('dateInput').value;

}

function setWarm(){

document.getElementById('lightArea').style.boxShadow =
'0 0 55px rgba(255,220,180,0.95)';

document.getElementById('singleLight').style.boxShadow =
'0 0 55px rgba(255,220,180,0.95)';

}

function setWhite(){

document.getElementById('lightArea').style.boxShadow =
'0 0 55px rgba(255,255,255,0.95)';

document.getElementById('singleLight').style.boxShadow =
'0 0 55px rgba(255,255,255,0.95)';

}

function setBlue(){

document.getElementById('lightArea').style.boxShadow =
'0 0 55px rgba(180,220,255,0.95)';

document.getElementById('singleLight').style.boxShadow =
'0 0 55px rgba(180,220,255,0.95)';

}

const singleBtn=document.getElementById('singleBtn');
const deskBtn=document.getElementById('deskBtn');

const deskSet=document.getElementById('deskSet');
const singleFrame=document.getElementById('singleFrame');

singleBtn.onclick=function(){

singleBtn.classList.add('bg-white');
deskBtn.classList.remove('bg-white');

deskSet.classList.add('hidden');
singleFrame.classList.remove('hidden');

}

deskBtn.onclick=function(){

deskBtn.classList.add('bg-white');
singleBtn.classList.remove('bg-white');

singleFrame.classList.add('hidden');
deskSet.classList.remove('hidden');

}

</script>

</body>
</html>
