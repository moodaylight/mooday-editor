<!DOCTYPE html>
<html lang="zh">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY EDITOR</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

    <div class="canvas-wrap">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">

        <input type="file" id="upload">

        <input type="text" id="textInput" placeholder="输入文字">

        <button id="addText">新增文字</button>
<button id="deleteText">删除文字</button>
        <label>图片缩放</label>
        <input type="range" id="scaleSlider" min="0.5" max="3" step="0.01" value="1">

        <label>图片旋转</label>
        <input type="range" id="rotateSlider" min="-180" max="180" value="0">

        <label>文字大小</label>
        <input type="range" id="textSizeSlider" min="20" max="150" value="60">

        <label>文字旋转</label>
        <input type="range" id="textRotateSlider" min="-180" max="180" value="0">

        <label>发光强度</label>
        <input type="range" id="glowSlider" min="0" max="50" value="20">

        <label>文字颜色</label>
        <input type="color" id="colorPicker" value="#ffffff">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
