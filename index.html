<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOODAY 在线编辑器</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
background:#f5f5f7;
color:#111;
height:100%;
overflow-x:hidden;
}

body{
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.header{
background:white;
border-bottom:1px solid #e5e5e5;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
position:fixed;
top:0;
left:0;
width:100%;
z-index:999;
}

.title h1{
font-size:20px;
font-weight:700;
}

.title p{
font-size:11px;
color:#777;
margin-top:2px;
}

.submit-btn{
background:black;
color:white;
border:none;
border-radius:999px;
padding:10px 18px;
font-size:13px;
}

.container{
max-width:430px;
margin:auto;
padding:90px 18px 18px;
}

</html>
