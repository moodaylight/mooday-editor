<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY REAL LIGHT FRAME</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ece7df;
font-family:sans-serif;
overflow:hidden;
}

/* ===== 전체 ===== */

.app{
display:flex;
height:100vh;
}

/* ===== 왼쪽 메뉴 ===== */

.sidebar{
width:90px;
background:#f7f4ef;
border-right:1px solid #e8e1d8;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:18px;
}

.menu-item{
width:62px;
height:62px;
background:#efebe6;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
box-shadow:
inset 0 2px 4px rgba(255,255,255,0.8),
0 4px 8px rgba(0,0,0,0.05);
}

/* ===== 가운데 ===== */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
background:
linear-gradient(to bottom,#f3eee7,#ece6de);
}

/* ===== 작업 공간 ===== */

.workspace{
width:920px;
height:620px;
background:#f5f2ec;
border-radius:38px;
position:relative;
overflow:hidden;

box-shadow:
0 30px 60px rgba(0,0,0,0.18),
inset 0 3px 8px rgba(255,255,255,0.9);
}

/* ===== 배경 ===== */

.room-bg{
position:absolute;
inset:0;
background:
url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1600&auto=format&fit=crop')
center/cover;
opacity:0.18;
}

/* ===== 아크릴 액자 ===== */

.light-frame{

position:absolute;
left:150px;
top:120px;

width:460px;
height:250px;

border-radius:34px;

background:#2f3137;

overflow:hidden;

border:12px solid #f6f1e8;

box-shadow:

0 25px 50px rgba(0,0,0,0.35),

0 0 30px rgba(255,240,210,0.45),

inset 0 0 20px rgba(255,255,255,0.08),

inset 0 -8px 16px rgba(0,0,0,0.25);
}

/* ===== 실제 사진 ===== */

.light-frame img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.82;
}

/* ===== 어두운 유리 ===== */

.dark-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

/* ===== 네온 점선 ===== */

.neon-line{
position:absolute;
inset:16px;
border:4px dashed #ff8fd2;
border-radius:24px;

box-shadow:
0 0 10px rgba(255,140,220,0.9);
}

/* ===== 상단 텍스트 ===== */

.title{
position:absolute;
top:28px;
width:100%;
text-align:center;
font-size:52px;
font-weight:800;
color:white;
letter-spacing:-1px;

text-shadow:
0 0 12px rgba(255,255,255,0.8),
0 0 22px rgba(255,160,220,0.6);
}

/* ===== 날짜 ===== */

.date{
position:absolute;
bottom:34px;
width:100%;
text-align:center;
font-size:36px;
font-weight:700;
color:white;

text-shadow:
0 0 10px rgba(255,255,255,0.7);
}

/* ===== 아크릴 받침대 ===== */

.base{

position:absolute;
left:190px;
bottom:55px;

width:390px;
height:88px;

border-radius:28px;

background:
linear-gradient(
to bottom,
rgba(255,255,255,0.96),
rgba(240,235,230,0.92)
);

backdrop-filter:blur(8px);

display:flex;
align-items:center;
justify-content:center;

font-size:30px;
color:#b49fa5;

box-shadow:

0 18px 35px rgba(0,0,0,0.18),

inset 0 2px 3px rgba(255,255,255,0.9);
}

/* ===== 오른쪽 펜꽂이 ===== */

.pen-holder{

position:absolute;
right:78px;
bottom:88px;

width:72px;
height:155px;

background:
linear-gradient(
to bottom,
#ffffff,
#ececec
);

border-radius:22px;

box-shadow:

0 18px 30px rgba(0,0,0,0.15),

inset 0 2px 4px rgba(255,255,255,0.8);
}

/* ===== 펜 ===== */

.pen-red{
position:absolute;
left:20px;
top:28px;
width:14px;
height:92px;
background:#ff7466;
border-radius:10px;
transform:rotate(7deg);
}

.pen-gray{
position:absolute;
left:40px;
top:18px;
width:14px;
height:105px;
background:#98a1b2;
border-radius:10px;
transform:rotate(-10deg);
}

/* ===== 태그 ===== */

.tag{

position:absolute;
right:165px;
top:180px;

width:82px;
height:130px;

background:white;

border-radius:20px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:6px;

font-size:14px;
color:#666;

box-shadow:

0 12px 24px rgba(0,0,0,0.12);
}

/* ===== 우측 레이어 ===== */

.right-panel{

width:280px;
background:#f7f4ef;

border-left:1px solid #e6dfd5;

padding:26px;
}

.panel-title{
font-size:42px;
font-weight:800;
margin-bottom:24px;
}

.layer{

background:white;

border-radius:22px;

padding:22px;

margin-bottom:18px;

display:flex;
justify-content:space-between;
align-items:center;

font-size:20px;

box-shadow:
0 5px 14px rgba(0,0,0,0.05);
}

/* ===== 상단 버튼 ===== */

.top-switch{

position:absolute;
top:28px;
left:50%;
transform:translateX(-50%);

display:flex;

background:#efebe6;

padding:6px;

border-radius:999px;
}

.switch-btn{

padding:14px 34px;

border-radius:999px;

font-size:18px;
font-weight:700;
}

.active{
background:#4b5563;
color:white;
}

/* ===== 모바일 ===== */

@media(max-width:768px){

body{
overflow:auto;
}

.app{
flex-direction:column;
height:auto;
}

.sidebar{
width:100%;
height:90px;
flex-direction:row;
justify-content:center;
padding-top:0;
border-right:none;
border-bottom:1px solid #e8e1d8;
}

.right-panel{
width:100%;
border-left:none;
border-top:1px solid #e8e1d8;
}

.workspace{
width:95vw;
height:125vw;
margin:20px auto;
}

.light-frame{
left:8%;
top:24%;
width:78%;
height:34%;
}

.title{
font-size:34px;
}

.date{
font-size:24px;
}

.base{
left:14%;
width:72%;
height:64px;
font-size:20px;
}

.pen-holder{
right:5%;
bottom:16%;
width:54px;
height:110px;
}

.tag{
right:18%;
top:45%;
width:58px;
height:95px;
font-size:10px;
}

.panel-title{
font-size:28px;
}

.layer{
font-size:16px;
padding:18px;
}

.top-switch{
top:16px;
}

.switch-btn{
padding:10px 18px;
font-size:14px;
}
}

</style>
</head>

<body>

<div class="app">

<!-- 왼쪽 -->

<div class="sidebar">

<div class="menu-item">🖼️</div>
<div class="menu-item">T</div>
<div class="menu-item">😊</div>
<div class="menu-item">⬡</div>
<div class="menu-item">🎨</div>

</div>

<!-- 가운데 -->

<div class="main">

<div class="workspace">

<div class="room-bg"></div>

<div class="top-switch">
<div class="switch-btn active">전체 보기 (편집 영역)</div>
<div class="switch-btn">실제 표시 영역</div>
</div>

<!-- 액자 -->

<div class="light-frame">

<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">

<div class="dark-overlay"></div>

<div class="neon-line"></div>

<div class="title">
♡ 우리의 추억 ♡
</div>

<div class="date">
2024.05.20 사랑해 ♡
</div>

</div>

<!-- 태그 -->

<div class="tag">
🌸
<div>우리의 추억</div>
<div>2024.05.20</div>
</div>

<!-- 펜꽂이 -->

<div class="pen-holder">

<div class="pen-red"></div>

<div class="pen-gray"></div>

</div>

<!-- 받침 -->

<div class="base">
♡ 나의 소중한 순간 ♡
</div>

</div>

</div>

<!-- 오른쪽 -->

<div class="right-panel">

<div class="panel-title">
레이어
</div>

<div class="layer">
<span>텍스트 레이어</span>
👁️
</div>

<div class="layer">
<span>날짜 레이어</span>
👁️
</div>

<div class="layer">
<span>사진 레이어</span>
👁️
</div>

<div class="layer">
<span>스티커 레이어</span>
👁️
</div>

</div>

</div>

</body>
</html>
