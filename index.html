<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY Editor V4</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #222;
background:#111;
}

header h1{
font-size:22px;
font-weight:300;
letter-spacing:2px;
}

.top-buttons{
display:flex;
gap:10px;
}

button{
background:#1c1c1c;
border:1px solid #333;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
}

button:hover{
background:#2a2a2a;
}

.main{
flex:1;
padding:20px;
max-width:520px;
width:100%;
margin:0 auto;
display:flex;
flex-direction:column;
gap:20px;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
flex:1;
padding:14px;
text-align:center;
border-radius:16px;
background:#181818;
border:1px solid #2d2d2d;
cursor:pointer;
}

.active{
background:#2d241d;
border-color:#d4a36c;
}

.canvas-wrap{
display:flex;
justify-content:center;
}

.canvas{
position:relative;
overflow:hidden;
background:black;
border-radius:24px;
touch-action:none;
}

.paper{
width:360px;
height:240px;
}

.acrylic{
width:240px;
height:360px;
background:rgba(255,255,255,0.03);
border:2px solid rgba(255,255,255,0.1);
}

#preview{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
max-width:none;
user-select:none;
pointer-events:none;
}

.visible-area{
position:absolute;
left:22px;
right:22px;
top:22px;
bottom:22px;
border:2px dashed rgba(255,255,255,0.8);
border-radius:10px;
pointer-events:none;
}

.mask{
position:absolute;
background:rgba(0,0,0,0.55);
pointer-events:none;
}

.mask-top{
top:0;
left:0;
right:0;
height:22px;
}

.mask-bottom{
bottom:0;
left:0;
right:0;
height:22px;
}

.mask-left{
left:0;
top:22px;
bottom:22px;
width:22px;
}

.mask-right{
right:0;
top:22px;
bottom:22px;
width:22px;
}

.safe-zone{
position:absolute;
left:10px;
right:10px;
bottom:10px;
height:260px;
border:2px dashed rgba(255,200,120,0.8);
border-radius:12px;
display:none;
pointer-events:none;
}

.top-zone{
position:absolute;
top:0;
left:0;
right:0;
height:80px;
display:none;
justify-content:center;
align-items:center;
font-size:12px;
letter-spacing:2px;
color:rgba(255,255,255,0.6);
pointer-events:none;
}

.base-light{
position:absolute;
bottom:-12px;
left:50%;
transform:translateX(-50%);
width:140px;
height:22px;
border-radius:30px;
background:#f7c58a;
filter:blur(14px);
display:none;
}

.controls{
background:#151515;
border:1px solid #222;
padding:18px;
border-radius:20px;
display:flex;
flex-direction:column;
gap:16px;
}

label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
display:block;
}

input[type="range"]{
width:100%;
}

.light-buttons{
display:flex;
gap:10px;
}

.light-buttons button{
flex:1;
}

.tip{
font-size:12px;
line-height:1.7;
color:#777;
}

footer{
padding:14px;
text-align:center;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<header>
<h1>MOODAY</h1>

<div class="top-buttons">
<button>重新编辑</button>
<button>提交制作</button>
</div>
</header>

<div class="main">

<div class="tabs">
<div class="tab active" id="paperTab">灯光画</div>
<div class="tab" id="acrylicTab">亚克力灯</div>
</div>

<div class="canvas-wrap">

<div class="canvas paper" id="canvas">

<img id="preview"
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop">

<div class="mask mask-top"></div>
<div class="mask mask-bottom"></div>
<div class="mask mask-left"></div>
<div class="mask mask-right"></div>

<div class="visible-area" id="visibleArea"></div>

<div class="safe-zone" id="safeZone"></div>

<div class="top-zone" id="topZone">
装饰区域 / 名字区域
</div>

<div class="base-light" id="baseLight"></div>

</div>

</div>

<div class="controls">

<div>
<label>上传图片</label>
<input type="file" id="upload" accept="image/*">
</div>

<div>
<label>缩放</label>
<input type="range" id="scale" min="50" max="200" value="100">
</div>

<div>
<label>灯光预览</label>

<div class="light-buttons">
<button onclick="setWarm()">暖光</button>
<button onclick="setWhite()">白光</button>
<button onclick="setDay()">日光</button>
</div>
</div>

<div class="tip">
请将重要人物与文字放在显示区域内。<br>
外部区域可能被遮挡。
</div>

</div>

</div>

<footer>
MOODAY • Night Light Editor
</footer>

<script>
const upload = document.getElementById('upload');
const preview = document.getElementById('preview');
const scaleSlider = document.getElementById('scale');

const canvas = document.getElementById('canvas');

const paperTab = document.getElementById('paperTab');
const acrylicTab = document.getElementById('acrylicTab');

const safeZone = document.getElementById('safeZone');
const topZone = document.getElementById('topZone');
const baseLight = document.getElementById('baseLight');
const visibleArea = document.getElementById('visibleArea');

let scale = 1;
let posX = 0;
let posY = 0;

function updateImage(){
preview.style.transform =
`translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
}

upload.addEventListener('change',function(e){
const file = e.target.files[0];

if(file){
const reader = new FileReader();

reader.onload=function(event){
preview.src = event.target.result;
}

reader.readAsDataURL(file);
}
});

scaleSlider.addEventListener('input',function(){
scale = scaleSlider.value / 100;
updateImage();
});

let dragging = false;
let startX,startY;

canvas.addEventListener('mousedown',startDrag);
canvas.addEventListener('touchstart',startDrag);

function startDrag(e){
dragging = true;

if(e.touches){
startX = e.touches[0].clientX;
startY = e.touches[0].clientY;
}else{
startX = e.clientX;
startY = e.clientY;
}
}

window.addEventListener('mousemove',drag);
window.addEventListener('touchmove',drag);

function drag(e){

if(!dragging) return;

let currentX,currentY;

if(e.touches){
currentX = e.touches[0].clientX;
currentY = e.touches[0].clientY;
}else{
currentX = e.clientX;
currentY = e.clientY;
}

posX += currentX - startX;
posY += currentY - startY;

startX = currentX;
startY = currentY;

updateImage();
}

window.addEventListener('mouseup',()=>dragging=false);
window.addEventListener('touchend',()=>dragging=false);

paperTab.addEventListener('click',()=>{

canvas.className='canvas paper';

paperTab.classList.add('active');
acrylicTab.classList.remove('active');

visibleArea.style.display='block';

safeZone.style.display='none';
topZone.style.display='none';
baseLight.style.display='none';

});

acrylicTab.addEventListener('click',()=>{

canvas.className='canvas acrylic';

paperTab.classList.remove('active');
acrylicTab.classList.add('active');

visibleArea.style.display='none';

safeZone.style.display='block';
topZone.style.display='flex';
baseLight.style.display='block';

});

function setWarm(){
canvas.style.boxShadow='0 0 40px rgba(255,190,120,0.45)';
baseLight.style.background='#f7c58a';
preview.style.filter='brightness(1.05) sepia(0.25)';
}

function setWhite(){
canvas.style.boxShadow='0 0 40px rgba(255,255,255,0.45)';
baseLight.style.background='#ffffff';
preview.style.filter='brightness(1.1)';
}

function setDay(){
canvas.style.boxShadow='0 0 40px rgba(180,220,255,0.45)';
baseLight.style.background='#d7ecff';
preview.style.filter='brightness(1.15)';
}

updateImage();
</script>

</body>
</html>
