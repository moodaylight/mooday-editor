<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MOODAY 在线编辑器</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:#f5f5f7;
color:#111;
overflow-x:hidden;
touch-action:none;
}

.header{
background:white;
border-bottom:1px solid #e5e5e5;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:100;
}

.title h1{
font-size:20px;
font-weight:700;
}

.title p{
font-size:11px;
color:#777;
margin-top:2px;
}

.submit-btn{
background:black;
color:white;
border:none;
border-radius:999px;
padding:10px 18px;
font-size:13px;
cursor:pointer;
}

.container{
max-width:430px;
margin:auto;
padding:18px;
}

.template-list{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:18px;
padding-bottom:4px;
}

.template-item{
background:white;
border:1px solid #ddd;
border-radius:999px;
padding:10px 16px;
white-space:nowrap;
font-size:13px;
flex-shrink:0;
cursor:pointer;
}

.editor-box{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #e5e5e5;
display:flex;
justify-content:center;
margin-bottom:20px;
}

.frame{
width:238px;
height:348px;
background:#f8f8f8;
border-radius:30px;
padding:28px;
position:relative;
border:1px solid #d9d9d9;
box-shadow:
inset 0 0 10px rgba(0,0,0,0.08),
0 8px 20px rgba(0,0,0,0.06);
}

.inner-step{
position:absolute;
top:28px;
left:28px;
right:28px;
bottom:28px;
border-radius:18px;
box-shadow:inset 0 3px 8px rgba(0,0,0,0.2);
border:1px solid #d5d5d5;
overflow:hidden;
background:black;
}

.photo-area{
width:100%;
height:100%;
position:relative;
overflow:hidden;
}

.photo-wrapper{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.photo-area img{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
transition:0.25s;
user-select:none;
pointer-events:none;
transform-origin:center;
}

.light-layer{
position:absolute;
inset:0;
background:rgba(255,180,120,0.22);
mix-blend-mode:screen;
transition:0.3s;
pointer-events:none;
}

.mirror-layer{
position:absolute;
inset:0;
background:
linear-gradient(
135deg,
rgba(255,255,255,0.2),
rgba(255,255,255,0.03),
rgba(255,255,255,0.12)
);
backdrop-filter:blur(1px);
opacity:0;
transition:0.3s;
pointer-events:none;
}

.text-layer{
position:absolute;
left:50%;
bottom:20px;
transform:translateX(-50%);
color:white;
font-size:22px;
letter-spacing:4px;
text-shadow:0 0 10px rgba(255,255,255,0.6);
padding:0 10px;
cursor:move;
white-space:nowrap;
z-index:5;
user-select:none;
}

.panel{
background:white;
border-radius:28px;
padding:18px;
border:1px solid #e5e5e5;
margin-bottom:20px;
}

.upload-btn{
width:100%;
border:none;
background:black;
color:white;
padding:14px;
border-radius:18px;
font-size:14px;
cursor:pointer;
margin-bottom:18px;
}

.section-title{
font-size:14px;
font-weight:700;
margin-bottom:12px;
}

.tool-row{
display:flex;
gap:8px;
overflow-x:auto;
margin-bottom:20px;
padding-bottom:2px;
}

.tool-btn{
background:#f1f1f1;
border:none;
border-radius:999px;
padding:10px 16px;
white-space:nowrap;
font-size:13px;
cursor:pointer;
flex-shrink:0;
}

.light-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:8px;
}

.light-btn{
border:none;
border-radius:18px;
padding:12px 0;
font-size:13px;
cursor:pointer;
}

.white-light{
background:#eef5ff;
color:#2563eb;
}

.warm-light-btn{
background:#fff2e8;
color:#ea580c;
}

.day-light{
background:#fff8dc;
color:#ca8a04;
}

.off-light{
background:#f1f1f1;
color:#555;
}

.active-light{
outline:2px solid black;
}

.footer-tip{
text-align:center;
color:#999;
font-size:12px;
line-height:1.8;
padding:10px 0 40px;
}

</style>
</head>

<body>

<header class="header">

<div class="title">
<h1>MOODAY 在线编辑器</h1>
<p>魔镜灯光画</p>
</div>

<button class="submit-btn">
提交制作
</button>

</header>

<div class="container">

<div class="template-list">

<div class="template-item">
韩系情侣
</div>

<div class="template-item">
暖光氛围
</div>

<div class="template-item">
夜景风格
</div>

<div class="template-item">
极简艺术
</div>

</div>

<div class="editor-box">

<div class="frame">

<div class="inner-step">

<div class="photo-area">

<div class="photo-wrapper">

<img
id="photo"
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
>

</div>

<div class="light-layer" id="lightLayer"></div>

<div class="mirror-layer" id="mirrorLayer"></div>

<div class="text-layer" id="textLayer">
FOREVER
</div>

</div>

</div>

</div>

</div>

<div class="panel">

<button class="upload-btn" id="uploadBtn">
上传照片
</button>

<div class="section-title">
文字编辑
</div>

<div class="tool-row">

<button class="tool-btn" id="addTextBtn">
添加文字
</button>

<button class="tool-btn" id="fontBtn">
字体
</button>

<button class="tool-btn" id="colorBtn">
颜色
</button>

<button class="tool-btn" id="sizeBtn">
放大
</button>

</div>

<div class="section-title">
灯光模式
</div>

<div class="light-grid">

<button class="light-btn white-light active-light" id="whiteBtn">
白光
</button>

<button class="light-btn warm-light-btn" id="warmBtn">
暖光
</button>

<button class="light-btn day-light" id="dayBtn">
日光
</button>

<button class="light-btn off-light" id="offBtn">
💡✕ 关灯
</button>

</div>

</div>

<div class="footer-tip">
支持双指缩放与拖动照片<br>
支持 JPG / PNG / HEIC
</div>

</div>

<script>

const uploadBtn=document.getElementById('uploadBtn');

const fileInput=document.createElement('input');

fileInput.type='file';

fileInput.accept='image/png,image/jpeg,image/heic';

fileInput.style.display='none';

document.body.appendChild(fileInput);

const photo=document.getElementById('photo');

const lightLayer=document.getElementById('lightLayer');

const mirrorLayer=document.getElementById('mirrorLayer');

const textLayer=document.getElementById('textLayer');

let currentScale=1;

let currentX=0;

let currentY=0;

let startX=0;

let startY=0;

let isDragging=false;

function updatePhoto(){

photo.style.transform=
`translate(${currentX}px,${currentY}px) scale(${currentScale})`;

}

uploadBtn.onclick=()=>{

fileInput.click();

};

fileInput.addEventListener('change',(e)=>{

const file=e.target.files[0];

if(!file)return;

const reader=new FileReader();

reader.onload=(event)=>{

photo.src=event.target.result;

};

reader.readAsDataURL(file);

});

photo.parentElement.addEventListener('touchstart',(e)=>{

if(e.touches.length===1){

isDragging=true;

startX=e.touches[0].clientX-currentX;

startY=e.touches[0].clientY-currentY;

}

});

document.addEventListener('touchmove',(e)=>{

if(!isDragging)return;

currentX=e.touches[0].clientX-startX;

currentY=e.touches[0].clientY-startY;

updatePhoto();

});

document.addEventListener('touchend',()=>{

isDragging=false;

});

photo.parentElement.addEventListener('wheel',(e)=>{

e.preventDefault();

if(e.deltaY<0){

currentScale+=0.05;

}else{

currentScale-=0.05;

}

if(currentScale<1){

currentScale=1;

}

if(currentScale>3){

currentScale=3;

}

updatePhoto();

});

function clearLight(){

document
.querySelectorAll('.light-btn')
.forEach(btn=>{

btn.classList.remove('active-light');

});

}

whiteBtn.onclick=()=>{

clearLight();

whiteBtn.classList.add('active-light');

lightLayer.style.background='rgba(255,255,255,0.08)';

mirrorLayer.style.opacity='0';

photo.style.filter='brightness(1.05)';

};

warmBtn.onclick=()=>{

clearLight();

warmBtn.classList.add('active-light');

lightLayer.style.background='rgba(255,180,120,0.22)';

mirrorLayer.style.opacity='0';

photo.style.filter='sepia(0.08) brightness(1.02)';

};

dayBtn.onclick=()=>{

clearLight();

dayBtn.classList.add('active-light');

lightLayer.style.background='rgba(255,245,200,0.16)';

mirrorLayer.style.opacity='0';

photo.style.filter='brightness(1.12) saturate(1.05)';

};

offBtn.onclick=()=>{

clearLight();

offBtn.classList.add('active-light');

lightLayer.style.background='rgba(0,0,0,0.75)';

mirrorLayer.style.opacity='1';

photo.style.filter='brightness(0)';

};

addTextBtn.onclick=()=>{

const text=prompt('请输入文字');

if(text&&text.trim()!==''){

textLayer.innerText=text;

}

};

const fonts=[
'Arial',
'Georgia',
'cursive',
'monospace'
];

let fontIndex=0;

fontBtn.onclick=()=>{

fontIndex++;

if(fontIndex>=fonts.length){

fontIndex=0;

}

textLayer.style.fontFamily=fonts[fontIndex];

};

const colors=[
'white',
'#ffcc00',
'#00e5ff',
'#ff66cc',
'#00ff99'
];

let colorIndex=0;

colorBtn.onclick=()=>{

colorIndex++;

if(colorIndex>=colors.length){

colorIndex=0;

}

textLayer.style.color=colors[colorIndex];

};

let textSize=22;

sizeBtn.onclick=()=>{

textSize+=4;

if(textSize>50){

textSize=22;

}

textLayer.style.fontSize=textSize+'px';

};

</script>

</body>
</html>
