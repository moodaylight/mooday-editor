*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
-webkit-tap-highlight-color:transparent;
}

html,body{
background:#f5f5f7;
color:#111;
height:100%;
overflow-x:hidden;
}

body{
overflow-y:auto;
-webkit-overflow-scrolling:touch;
}

.header{
background:white;
border-bottom:1px solid #e5e5e5;
padding:14px 18px;
display:flex;
justify-content:space-between;
align-items:center;

position:fixed;
top:0;
left:0;
width:100%;

z-index:999;
}

.title h1{
font-size:20px;
font-weight:700;
}

.title p{
font-size:11px;
color:#777;
margin-top:2px;
}

.submit-btn{
background:black;
color:white;
border:none;
border-radius:999px;
padding:10px 18px;
font-size:13px;
}

.container{
max-width:430px;
margin:auto;
padding:90px 18px 18px;
}

.template-list{
display:flex;
gap:10px;
overflow-x:auto;
margin-bottom:18px;
}

.template-item{
background:white;
border:1px solid #ddd;
border-radius:999px;
padding:10px 16px;
white-space:nowrap;
font-size:13px;
flex-shrink:0;
}

.editor-box{
background:white;
border-radius:30px;
padding:24px;
border:1px solid #e5e5e5;
display:flex;
justify-content:center;
margin-bottom:20px;
}

.frame{
width:238px;
height:348px;
background:#f8f8f8;
border-radius:30px;
padding:28px;
position:relative;
border:1px solid #d9d9d9;

box-shadow:
inset 0 0 10px rgba(0,0,0,0.08),
0 8px 20px rgba(0,0,0,0.06);
}

.inner-step{
position:absolute;
top:28px;
left:28px;
right:28px;
bottom:28px;

overflow:hidden;

border-radius:18px;

border:1px solid #d5d5d5;

box-shadow:
inset 0 3px 8px rgba(0,0,0,0.2);

background:black;
}

.photo-area{
width:100%;
height:100%;
position:relative;
overflow:hidden;
touch-action:none;
}

#photo{

width:110%;
height:110%;
left:-5%;
top:-5%;
object-fit:cover;
transform-origin:center;
transition:0.03s;
}
