<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MOODAY Editor</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0f0f;
color:white;
min-height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:18px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
background:#111;
}

header h1{
font-size:22px;
font-weight:300;
letter-spacing:2px;
}

.top-buttons{
display:flex;
gap:10px;
}

button{
background:#1e1e1e;
border:1px solid #333;
color:white;
padding:10px 14px;
border-radius:12px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#2b2b2b;
}

.main{
flex:1;
display:flex;
flex-direction:column;
padding:20px;
gap:20px;
max-width:520px;
width:100%;
margin:0 auto;
}

.product-tabs{
display:flex;
gap:10px;
}

.tab{
flex:1;
text-align:center;
padding:14px;
border-radius:16px;
background:#181818;
border:1px solid #2d2d2d;
transition:0.2s;
}

.active{
background:#2d241d;
border-color:#c28b52;
}

.canvas-wrap{
position:relative;
width:100%;
display:flex;
justify-content:center;
}

.canvas{
position:relative;
overflow:hidden;
border-radius:24px;
background:#000;
}

.paper-frame{
width:360px;
height:240px;
background:#111;
}

.preview-image{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
z-index:1;
filter:brightness(1);
}

.real-frame{
position:absolute;
inset:0;
pointer-events:none;
z-index:10;
}

.mask-top,
.mask-bottom,
.mask-left,
.mask-right{
position:absolute;
background:rgba(0,0,0,0.55);
backdrop-filter:blur(2px);
}

.mask-top{
top:0;
left:0;
right:0;
height:22px;
}

.mask-bottom{
bottom:0;
left:0;
right:0;
height:22px;
}

.mask-left{
left:0;
top:22px;
bottom:22px;
width:22px;
}

.mask-right{
right:0;
top:22px;
bottom:22px;
width:22px;
}

.visible-window{
position:absolute;
left:22px;
right:22px;
top:22px;
bottom:22px;
border:2px dashed rgba(255,255,255,0.9);
border-radius:8px;
box-shadow:0 0 20px rgba(255,255,255,0.1);
}

.window-text{
position:absolute;
bottom:8px;
left:50%;
transform:translateX(-50%);
font-size:11px;
color:rgba(255,255,255,0.8);
letter-spacing:1px;
}

.acrylic-frame{
width:240px;
height:360px;
background:rgba(255,255,255,0.03);
border:2px solid rgba(255,255,255,0.15);
backdrop-filter:blur(2px);
}

.acrylic-safe{
position:absolute;
left:10px;
right:10px;
bottom:10px;
height:260px;
border:2px dashed rgba(255,200,120,0.8);
border-radius:12px;
z-index:10;
}

.top-zone{
position:absolute;
top:0;
left:0;
right:0;
height:80px;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
color:rgba(255,255,255,0.6);
letter-spacing:2px;
z-index:11;
}

.base-light{
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%);
width:140px;
height:22px;
border-radius:20px;
background:#f6c28b;
filter:blur(12px);
opacity:0.7;
}

.controls{
display:flex;
flex-direction:column;
gap:16px;
background:#151515;
padding:18px;
border-radius:20px;
border:1px solid #222;
}

label{
font-size:13px;
color:#aaa;
margin-bottom:6px;
display:block;
}

input[type="range"]{
width:100%;
}

.light-buttons{
display:flex;
gap:10px;
}

.light-btn{
flex:1;
}

footer{
padding:14px;
text-align:center;
font-size:12px;
color:#666;
}
</style>
</head>
<body>

<header>
<h1>MOODAY</h1>

<div class="top-buttons">
<button>重新编辑</button>
<button>提交制作</button>
</div>
</header>

<div class="main">

<div class="product-tabs">
<div class="tab active" id="paperTab" onclick="showPaper()">灯光画</div>
<div class="tab" id="acrylicTab" onclick="showAcrylic()">亚克力灯</div>
</div>

<div class="canvas-wrap">

<div class="canvas paper-frame" id="canvas">

<img
id="preview"
class="preview-image"
src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop"
/>

<div class="real-frame" id="paperFrame">
<div class="mask-top"></div>
<div class="mask-bottom"></div>
<div class="mask-left"></div>
<div class="mask-right"></div>
<div class="visible-window"></div>
<div class="window-text">实际显示区域</div>
</div>

<div class="top-zone" id="topZone" style="display:none;">
装饰区域 / 名字区域
</div>

<div class="acrylic-safe" id="acrylicSafe" style="display:none;"></div>
<div class="base-light" id="baseLight" style="display:none;"></div>

</div>

</div>

<div class="controls">

<div>
<label>上传图片</label>
<input type="file" id="upload" accept="image/*" />
</div>

<div>
<label>缩放</label>
<input type="range" id="scale" min="80" max="180" value="100" />
</div>

<div>
<label>灯光预览</label>
<div class="light-buttons">
<button class="light-btn" onclick="setWarm()">暖光</button>
<button class="light-btn" onclick="setWhite()">白光</button>
<button class="light-btn" onclick="setDay()">日光</button>
</div>
</div>

<div>
<label>说明</label>
<p style="font-size:12px;color:#777;line-height:1.7;">
请将重要人物与文字放在显示区域内。
外部区域可能被相框遮挡。
</p>
</div>

</div>

</div>

<footer>
MOODAY • Night Light Editor
</footer>

<script>
const upload = document.getElementById('upload');
const preview = document.getElementById('preview');
const scale = document.getElementById('scale');
const canvas = document.getElementById('canvas');

const paperTab = document.getElementById('paperTab');
const acrylicTab = document.getElementById('acrylicTab');

const paperFrame = document.getElementById('paperFrame');
const acrylicSafe = document.getElementById('acrylicSafe');
const topZone = document.getElementById('topZone');
const baseLight = document.getElementById('baseLight');

upload.addEventListener('change', function(e){
const file = e.target.files[0];
if(file){
const reader = new FileReader();
reader.onload = function(event){
preview.src = event.target.result;
}
reader.readAsDataURL(file);
}
});

scale.addEventListener('input', function(){
preview.style.transform = `translate(-50%,-50%) scale(${scale.value/100})`;
});

function showPaper(){
canvas.className = 'canvas paper-frame';
paperFrame.style.display = 'block';
acrylicSafe.style.display = 'none';
topZone.style.display = 'none';
baseLight.style.display = 'none';

paperTab.classList.add('active');
acrylicTab.classList.remove('active');
}

function showAcrylic(){
canvas.className = 'canvas acrylic-frame';
paperFrame.style.display = 'none';
acrylicSafe.style.display = 'block';
topZone.style.display = 'flex';
baseLight.style.display = 'block';

paperTab.classList.remove('active');
acrylicTab.classList.add('active');
}

function setWarm(){
preview.style.filter = 'brightness(1.05) sepia(0.25) saturate(1.1)';
baseLight.style.background = '#f7c58a';
}

function setWhite(){
preview.style.filter = 'brightness(1.08) saturate(1.02)';
baseLight.style.background = '#ffffff';
}

function setDay(){
preview.style.filter = 'brightness(1.15) contrast(1.05)';
baseLight.style.background = '#d7ecff';
}
</script>

</body>
</html>
