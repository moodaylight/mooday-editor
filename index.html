<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOODAY FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
margin:0;
background:#f3efe9;
font-family:sans-serif;
overflow:hidden;
}

.panel{
display:flex;
height:100vh;
}

.left-menu{
width:80px;
background:#f7f4f1;
display:flex;
flex-direction:column;
align-items:center;
padding-top:20px;
gap:18px;
border-right:1px solid #eee;
}

.menu-btn{
width:58px;
height:58px;
border-radius:18px;
background:#efebe7;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
}

.center{
flex:1;
display:flex;
justify-content:center;
align-items:center;
background:#f5f1eb;
position:relative;
}

.preview{
width:700px;
height:520px;
background:#ece7df;
border-radius:30px;
position:relative;
overflow:hidden;
box-shadow:
0 20px 40px rgba(0,0,0,0.25),
0 8px 20px rgba(255,255,255,0.35) inset;
}

.bg{
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop') center/cover;
opacity:0.18;
}

.frame{
position:absolute;
left:110px;
top:110px;
width:420px;
height:220px;
border-radius:30px;
background:#3a3a3f;
overflow:hidden;
border:10px solid #f5efe5;
box-shadow:
0 10px 30px rgba(0,0,0,0.35),
inset 0 0 20px rgba(255,255,255,0.1);
}

.frame img{
width:100%;
height:100%;
object-fit:cover;
opacity:0.75;
}

.overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.35);
}

.title{
position:absolute;
top:25px;
width:100%;
text-align:center;
font-size:48px;
font-weight:700;
color:white;
}

.date{
position:absolute;
bottom:28px;
width:100%;
text-align:center;
font-size:34px;
font-weight:700;
color:white;
}

.dashed{
position:absolute;
inset:14px;
border:4px dashed #ff89d0;
border-radius:22px;
}

.base{
position:absolute;
left:150px;
bottom:45px;
width:360px;
height:78px;
border-radius:24px;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:#b8a5aa;
box-shadow:0 8px 20px rgba(0,0,0,0.12);
}

.pen{
position:absolute;
right:70px;
bottom:75px;
width:58px;
height:120px;
background:white;
border-radius:18px;
box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.pen:before{
content:'';
position:absolute;
left:18px;
top:18px;
width:12px;
height:70px;
background:#ff7a6c;
border-radius:8px;
transform:rotate(8deg);
}

.pen:after{
content:'';
position:absolute;
left:33px;
top:10px;
width:12px;
height:80px;
background:#9ca3af;
border-radius:8px;
transform:rotate(-10deg);
}

.tag{
position:absolute;
right:140px;
top:155px;
width:70px;
height:120px;
background:white;
border-radius:18px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:15px;
color:#666;
box-shadow:0 10px 20px rgba(0,0,0,0.12);
}

.right{
width:260px;
background:#f7f4f1;
padding:25px;
border-left:1px solid #eee;
}

.layer{
background:white;
border-radius:18px;
padding:20px;
margin-bottom:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

@media(max-width:768px){

body{
overflow:auto;
}

.panel{
flex-direction:column;
}

.left-menu{
width:100%;
height:90px;
flex-direction:row;
justify-content:center;
border-right:none;
border-bottom:1px solid #eee;
}

.right{
width:100%;
border-left:none;
border-top:1px solid #eee;
}

.preview{
width:92vw;
height:70vw;
}

.frame{
left:8%;
top:18%;
width:72%;
height:36%;
}

.title{
font-size:32px;
}

.date{
font-size:24px;
}

.base{
left:15%;
width:70%;
font-size:20px;
height:60px;
}

.pen{
right:6%;
width:46px;
height:90px;
}

.tag{
right:20%;
width:55px;
height:90px;
font-size:11px;
}
}
</style>
</head>

<body>

<div class="panel">

<div class="left-menu">
<div class="menu-btn">🖼️</div>
<div class="menu-btn">T</div>
<div class="menu-btn">😊</div>
<div class="menu-btn">⬡</div>
<div class="menu-btn">🎨</div>
</div>

<div class="center">

<div class="preview">

<div class="bg"></div>

<div class="frame">
<img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">
<div class="overlay"></div>
<div class="dashed"></div>
<div class="title">♡ 우리의 추억 ♡</div>
<div class="date">2024.05.20 사랑해 ♡</div>
</div>

<div class="tag">
🌸
<div>우리의 추억</div>
<div>2024.05.20</div>
</div>

<div class="pen"></div>

<div class="base">
♡ 나의 소중한 순간 ♡
</div>

</div>

</div>

<div class="right">

<div class="layer">
<span>텍스트 레이어</span>
👁️
</div>

<div class="layer">
<span>날짜 레이어</span>
👁️
</div>

<div class="layer">
<span>사진 레이어</span>
👁️
</div>

<div class="layer">
<span>스티커 레이어</span>
👁️
</div>

</div>

</div>

</body>
</html>
